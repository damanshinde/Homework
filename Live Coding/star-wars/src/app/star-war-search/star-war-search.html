<div>
  <h1>Star Wars Search</h1>

  <form>
    <input
      type="text"
      name="characterName"
      placeholder="Enter a character name"
      [(ngModel)]="characterName"
    />

    <button type="button" (click)="onSubmit()">
      Submit
    </button>
  </form>

  @if (searchedCharacter && films.length > 0) {
    <table>
      <thead>
        <tr>
          <th>Film</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody>
        @for (film of films; track film.title) {
          <tr>
            <td>{{ film.title }}</td>
            <td>{{ film.year }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
